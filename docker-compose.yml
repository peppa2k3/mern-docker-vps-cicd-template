version: "3.8"

services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin1
      POSTGRES_PASSWORD: pass1
      POSTGRES_DB: theme_app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin1 -d theme_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - web
  backend:
    build: ./backend
    container_name: theme_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin1:pass1@db:5432/theme_app
      JWT_SECRET: super_secret_jwt_key_change_in_prod_2024
      PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - web
  frontend:
    build: ./frontend
    container_name: theme_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    networks:
      - web
volumes:
  db_data:
networks:
  web:
    external: true